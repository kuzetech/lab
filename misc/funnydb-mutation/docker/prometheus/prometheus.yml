global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: mutation-app
    static_configs:
      - targets: ["app:8080"]

  - job_name: kafka-exporter
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: redis-exporter
    static_configs:
      - targets: ["redis-exporter:9121"]
