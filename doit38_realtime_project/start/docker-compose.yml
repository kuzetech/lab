services:
  doris-fe:
    image: apache/doris:fe-4.0.1
    container_name: doris-fe
    hostname: fe
    restart: unless-stopped
    environment:
      FE_SERVERS: fe1:172.28.0.2:9010
      FE_ID: "1"
    ports:
      - "8030:8030"
      - "9030:9030"
    volumes:
      - ./doris-data/fe/doris-meta:/opt/apache-doris/fe/doris-meta
      - ./doris-data/fe/log:/opt/apache-doris/fe/log
    networks:
      doris-net:
        ipv4_address: 172.28.0.2

  doris-be:
    image: apache/doris:be-4.0.1
    container_name: doris-be
    hostname: be
    restart: unless-stopped
    depends_on:
      - doris-fe
    environment:
      FE_SERVERS: fe1:172.28.0.2:9010
      BE_ADDR: 172.28.0.3:9050
    ports:
      - "8040:8040"
    volumes:
      - ./doris-data/be/storage:/opt/apache-doris/be/storage
      - ./doris-data/be/log:/opt/apache-doris/be/log
    networks:
      doris-net:
        ipv4_address: 172.28.0.3

networks:
  doris-net:
    name: doris-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
