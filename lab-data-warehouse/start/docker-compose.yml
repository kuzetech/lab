volumes:
  nn1-data:
  nn2-data:
  jn1-data:
  jn2-data:
  jn3-data:
  dn1-data:
  dn2-data:
  dn3-data:
  hive-mysql-data:
  kafka-data:

networks:
  hdfs:
    name: hdfs-ha-net

services:
  zk1:
    image: zookeeper:3.9
    hostname: zk1
    container_name: hdfs-zk1
    environment:
      ZOO_MY_ID: 1
      ZOO_SERVERS: server.1=0.0.0.0:2888:3888;2181 server.2=zk2:2888:3888;2181 server.3=zk3:2888:3888;2181
    ports:
      - "2181:2181"
    networks:
      - hdfs

  zk2:
    image: zookeeper:3.9
    hostname: zk2
    container_name: hdfs-zk2
    environment:
      ZOO_MY_ID: 2
      ZOO_SERVERS: server.1=zk1:2888:3888;2181 server.2=0.0.0.0:2888:3888;2181 server.3=zk3:2888:3888;2181
    networks:
      - hdfs

  zk3:
    image: zookeeper:3.9
    hostname: zk3
    container_name: hdfs-zk3
    environment:
      ZOO_MY_ID: 3
      ZOO_SERVERS: server.1=zk1:2888:3888;2181 server.2=zk2:2888:3888;2181 server.3=0.0.0.0:2888:3888;2181
    networks:
      - hdfs

  jn1:
    image: bde2020/hadoop-base:2.0.0-hadoop3.2.1-java8
    hostname: jn1
    container_name: hdfs-jn1
    environment:
      HADOOP_CONF_DIR: /etc/hadoop
      FLUME_CLASSPATH: /etc/hadoop
    volumes:
      - ./hadoop-conf:/etc/hadoop:ro
      - ./scripts:/scripts:ro
      - jn1-data:/hadoop/dfs/journal
    entrypoint: ["/bin/bash", "/scripts/start-journalnode.sh"]
    networks:
      - hdfs

  jn2:
    image: bde2020/hadoop-base:2.0.0-hadoop3.2.1-java8
    hostname: jn2
    container_name: hdfs-jn2
    environment:
      HADOOP_CONF_DIR: /etc/hadoop
    volumes:
      - ./hadoop-conf:/etc/hadoop:ro
      - ./scripts:/scripts:ro
      - jn2-data:/hadoop/dfs/journal
    entrypoint: ["/bin/bash", "/scripts/start-journalnode.sh"]
    networks:
      - hdfs

  jn3:
    image: bde2020/hadoop-base:2.0.0-hadoop3.2.1-java8
    hostname: jn3
    container_name: hdfs-jn3
    environment:
      HADOOP_CONF_DIR: /etc/hadoop
    volumes:
      - ./hadoop-conf:/etc/hadoop:ro
      - ./scripts:/scripts:ro
      - jn3-data:/hadoop/dfs/journal
    entrypoint: ["/bin/bash", "/scripts/start-journalnode.sh"]
    networks:
      - hdfs

  nn1:
    image: bde2020/hadoop-base:2.0.0-hadoop3.2.1-java8
    hostname: nn1
    container_name: hdfs-nn1
    environment:
      HADOOP_CONF_DIR: /etc/hadoop
    depends_on:
      - jn1
      - jn2
      - jn3
      - zk1
      - zk2
      - zk3
    volumes:
      - ./hadoop-conf:/etc/hadoop:ro
      - ./scripts:/scripts:ro
      - nn1-data:/hadoop/dfs/name
    entrypoint: ["/bin/bash", "/scripts/start-nn1.sh"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/nn1/8020'"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s
    ports:
      - "9870:9870"
      - "8020:8020"
    networks:
      - hdfs

  nn2:
    image: bde2020/hadoop-base:2.0.0-hadoop3.2.1-java8
    hostname: nn2
    container_name: hdfs-nn2
    environment:
      HADOOP_CONF_DIR: /etc/hadoop
    depends_on:
      nn1:
        condition: service_healthy
    volumes:
      - ./hadoop-conf:/etc/hadoop:ro
      - ./scripts:/scripts:ro
      - nn2-data:/hadoop/dfs/name
    entrypoint: ["/bin/bash", "/scripts/start-nn2.sh"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/nn2/8020'"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s
    ports:
      - "9871:9870"
    networks:
      - hdfs

  dn1:
    image: bde2020/hadoop-base:2.0.0-hadoop3.2.1-java8
    hostname: dn1
    container_name: hdfs-dn1
    environment:
      HADOOP_CONF_DIR: /etc/hadoop
    depends_on:
      nn1:
        condition: service_healthy
      nn2:
        condition: service_healthy
    volumes:
      - ./hadoop-conf:/etc/hadoop:ro
      - ./scripts:/scripts:ro
      - dn1-data:/hadoop/dfs/data
    entrypoint: ["/bin/bash", "/scripts/start-datanode.sh"]
    networks:
      - hdfs

  dn2:
    image: bde2020/hadoop-base:2.0.0-hadoop3.2.1-java8
    hostname: dn2
    container_name: hdfs-dn2
    environment:
      HADOOP_CONF_DIR: /etc/hadoop
    depends_on:
      nn1:
        condition: service_healthy
      nn2:
        condition: service_healthy
    volumes:
      - ./hadoop-conf:/etc/hadoop:ro
      - ./scripts:/scripts:ro
      - dn2-data:/hadoop/dfs/data
    entrypoint: ["/bin/bash", "/scripts/start-datanode.sh"]
    networks:
      - hdfs

  dn3:
    image: bde2020/hadoop-base:2.0.0-hadoop3.2.1-java8
    hostname: dn3
    container_name: hdfs-dn3
    environment:
      HADOOP_CONF_DIR: /etc/hadoop
    depends_on:
      nn1:
        condition: service_healthy
      nn2:
        condition: service_healthy
    volumes:
      - ./hadoop-conf:/etc/hadoop:ro
      - ./scripts:/scripts:ro
      - dn3-data:/hadoop/dfs/data
    entrypoint: ["/bin/bash", "/scripts/start-datanode.sh"]
    networks:
      - hdfs

  datagen:
    image: eclipse-temurin:8-jre
    hostname: datagen
    container_name: hdfs-datagen
    working_dir: /datagen
    volumes:
      - ./datagen:/datagen
    command:
      - /bin/bash
      - -lc
      - |
        set -e
        mkdir -p ./data ./data/log
        USER_COUNT=0
        if [ -s ./data/users.txt ]; then
          USER_COUNT="$$(wc -l < ./data/users.txt || echo 0)"
        fi
        if [ "$${USER_COUNT}" -lt 10000 ]; then
          echo "users.txt has $${USER_COUNT} rows, regenerating to 10000..."
          java -cp datagen.jar cn.doitedu.datagen.beans.GenUsers 10000 ./data/users.txt
        fi
        START_AT="$(date +%F)_00:00:00"
        echo "start generating logs from $${START_AT}"
        exec java -jar datagen.jar 2000 "$${START_AT}" 1 ./data/users.txt ./data/log/ 1
    restart: unless-stopped
    networks:
      - hdfs

  flume-l2:
    build:
      context: .
      dockerfile: flume/Dockerfile
    hostname: flume-l2
    container_name: hdfs-flume-l2
    environment:
      HADOOP_CONF_DIR: /etc/hadoop
    depends_on:
      nn1:
        condition: service_healthy
      nn2:
        condition: service_healthy
    volumes:
      - ./flume/l2:/opt/flume-config:ro
      - ./hadoop-conf:/etc/hadoop:ro
      - ./flume/state/l2:/var/lib/flume/l2
    command:
      - /bin/bash
      - -lc
      - |
        mkdir -p /var/lib/flume/l2/channel/ck1 /var/lib/flume/l2/channel/data1 /var/lib/flume/l2/channel/ck2 /var/lib/flume/l2/channel/data2
        exec /app/bin/flume-ng agent -c /opt/flume-config -C /etc/hadoop -f /opt/flume-config/flume.conf -n a2 -Dflume.root.logger=INFO,console -Dlog4j.configuration=file:/opt/flume-config/log4j.properties
    restart: unless-stopped
    networks:
      - hdfs

  flume-l1:
    build:
      context: .
      dockerfile: flume/Dockerfile
    hostname: flume-l1
    container_name: hdfs-flume-l1
    depends_on:
      datagen:
        condition: service_started
      flume-l2:
        condition: service_started
    volumes:
      - ./flume/l1:/opt/flume-config:ro
      - ./datagen:/datagen:ro
      - ./flume/state/l1:/var/lib/flume/l1
    command:
      - /bin/bash
      - -lc
      - |
        mkdir -p /var/lib/flume/l1/taildir /var/lib/flume/l1/channel/checkpoint /var/lib/flume/l1/channel/data
        exec /app/bin/flume-ng agent -c /opt/flume-config -f /opt/flume-config/flume.conf -n a1 -Dflume.root.logger=INFO,console -Dlog4j.configuration=file:/opt/flume-config/log4j.properties
    restart: unless-stopped
    networks:
      - hdfs

  spark-master:
    build:
      context: .
      dockerfile: hive-spark/Dockerfile
    hostname: spark-master
    container_name: spark-master
    environment:
      HADOOP_CONF_DIR: /etc/hadoop
      SPARK_NO_DAEMONIZE: "true"
    volumes:
      - ./hadoop-conf:/etc/hadoop:ro
    entrypoint:
      - /bin/bash
      - -lc
    command:
      - exec /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master --port 7077 --webui-port 8081
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/7077'"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 20s
    ports:
      - "7077:7077"
      - "8081:8081"
    restart: unless-stopped
    networks:
      - hdfs

  spark-worker:
    build:
      context: .
      dockerfile: hive-spark/Dockerfile
    hostname: spark-worker
    container_name: spark-worker
    environment:
      HADOOP_CONF_DIR: /etc/hadoop
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_DIR: /tmp/spark/work
    depends_on:
      spark-master:
        condition: service_started
    volumes:
      - ./hadoop-conf:/etc/hadoop:ro
    entrypoint:
      - /bin/bash
      - -lc
    command:
      - mkdir -p /tmp/spark/work && exec /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker --webui-port 8082 spark://spark-master:7077
    ports:
      - "8082:8082"
    restart: unless-stopped
    networks:
      - hdfs

  hive-mysql:
    image: mysql:8.0
    hostname: hive-mysql
    container_name: hive-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: metastore
      MYSQL_USER: hive
      MYSQL_PASSWORD: hive123
    command:
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uhive -phive123 --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - hive-mysql-data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - hdfs

  hive-metastore:
    image: apache/hive:3.1.3
    hostname: hive-metastore
    container_name: hive-metastore
    environment:
      HADOOP_CONF_DIR: /etc/hadoop
      HOME: /tmp
    depends_on:
      hive-mysql:
        condition: service_healthy
      nn1:
        condition: service_healthy
      nn2:
        condition: service_healthy
    volumes:
      - ./hadoop-conf:/etc/hadoop:ro
      - ./hive-conf/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
      - ./hive-lib/mysql-connector-j-8.0.33.jar:/opt/hive/lib/mysql-connector-j-8.0.33.jar:ro
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/bash", "/scripts/start-hive-metastore.sh"]
    ports:
      - "9083:9083"
    restart: unless-stopped
    networks:
      - hdfs

  hive-server2:
    build:
      context: .
      dockerfile: hive-spark/Dockerfile
    hostname: hive-server2
    container_name: hive-server2
    environment:
      HADOOP_CONF_DIR: /etc/hadoop
      HOME: /tmp
      HIVE_MSCK_INTERVAL_SEC: 300
    depends_on:
      hive-metastore:
        condition: service_started
      nn1:
        condition: service_healthy
      nn2:
        condition: service_healthy
      spark-master:
        condition: service_started
      spark-worker:
        condition: service_started
    volumes:
      - ./hadoop-conf:/etc/hadoop:ro
      - ./hive-conf/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
      - ./hive-conf/init-datagen.sql:/opt/hive/conf/init-datagen.sql:ro
      - ./hive-lib/mysql-connector-j-8.0.33.jar:/opt/hive/lib/mysql-connector-j-8.0.33.jar:ro
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/bash", "/scripts/start-hiveserver2.sh"]
    ports:
      - "10000:10000"
      - "10002:10002"
    restart: unless-stopped
    networks:
      - hdfs

  kafka:
    image: apache/kafka:3.9.2
    container_name: kafka
    hostname: kafka
    user: root
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
    volumes:
      - kafka-data:/bitnami/kafka
