a2.sources = s1
a2.channels = c1
a2.sinks = k1

a2.sources.s1.type = avro
a2.sources.s1.bind = 0.0.0.0
a2.sources.s1.port = 41414

a2.channels.c1.type = file
a2.channels.c1.checkpointDir = /var/lib/flume/l2/channel/checkpoint
a2.channels.c1.dataDirs = /var/lib/flume/l2/channel/data
a2.channels.c1.capacity = 200000
a2.channels.c1.transactionCapacity = 2000

a2.sinks.k1.type = hdfs
a2.sinks.k1.hdfs.path = hdfs://mycluster/tmp/flume/datagen/dt=%Y-%m-%d
a2.sinks.k1.hdfs.filePrefix = app-access
a2.sinks.k1.hdfs.fileType = CompressedStream
a2.sinks.k1.hdfs.writeFormat = Text
a2.sinks.k1.hdfs.codeC = org.apache.hadoop.io.compress.GzipCodec
a2.sinks.k1.hdfs.fileSuffix = .gz
a2.sinks.k1.hdfs.rollInterval = 3600
a2.sinks.k1.hdfs.rollSize = 134217728
a2.sinks.k1.hdfs.rollCount = 0
a2.sinks.k1.hdfs.useLocalTimeStamp = true
a2.sinks.k1.hdfs.idleTimeout = 120
a2.sinks.k1.hdfs.minBlockReplicas = 1

a2.sources.s1.channels = c1
a2.sinks.k1.channel = c1
