services:
  postgres:
    image: postgres:18
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - data:/var/lib/postgresql
      - ./data/heros.sql:/docker-entrypoint-initdb.d/01-heros.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  data:
